{% extends "layout.html" %}

{% block content %}
<section class="auth-shell">
    <div class="hero-card p-4 mb-4">
        <h2 class="section-title mb-2">Create your account</h2>
        <p class="mb-0">Choose the account type that matches your use case.</p>
    </div>

    <div class="surface-card p-4 d-grid gap-3">
        <a href="{{ url_for('auth_routes.signup_user') }}" class="btn btn-primary btn-lg">
            Continue as User
        </a>
        <a href="{{ url_for('auth_routes.signup_owner') }}" class="btn btn-outline-secondary btn-lg">
            Continue as Owner
        </a>
    </div>
</section>
{% endblock %}
